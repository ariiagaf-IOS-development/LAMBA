stages:
  - build
  - test
  - deploy

build:
  stage: build
  script:
    - docker compose build
  tags:
    - docker

test-backend:
  stage: test
  script:
    - cd backend && go test ./...
  tags:
    - docker

deploy:
  stage: deploy
  before_script:
    - apk add --no-cache openssh-client
    
    - eval $(ssh-agent -s)
    - chmod 600 $SSH_PRIVATE_KEY
    - ssh-add $SSH_PRIVATE_KEY
    
    - mkdir -p ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile /dev/null" > ~/.ssh/config
  
  script:
    - ssh root@10.93.27.23 "
        cd /opt/lamba &&
        docker compose down &&
        docker compose up -d --build
      "
  only:
    - main
  tags:
    - docker
  environment:
    name: production