services:
  api:
    build: .
    environment:
      HTTP_ADDR: ":8080"
      GIN_MODE: release
      DATABASE_URL: postgres://lamba:lamba@postgres:5432/lamba?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lamba
      POSTGRES_USER: lamba
      POSTGRES_PASSWORD: lamba
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
