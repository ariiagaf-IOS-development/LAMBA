services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8080"
      GIN_MODE: release
      DATABASE_URL: postgres://lamba:lamba@postgres:5432/lamba?sslmode=disable
    ports:
      - "80:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lamba
      POSTGRES_USER: lamba
      POSTGRES_PASSWORD: lamba
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lamba -d lamba"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
